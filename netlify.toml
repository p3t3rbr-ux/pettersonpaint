[build]
  command = "npm run check"
  publish = "public"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions.page]
  included_files = ["public/index.html"]

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-store"
    X-Robots-Tag = "noindex, nofollow"

[[redirects]]
  from = "/"
  to = "/.netlify/functions/page"
  status = 200
  force = true

[[redirects]]
  from = "/api/content"
  to = "/.netlify/functions/content"
  status = 200

[[redirects]]
  from = "/api/login"
  to = "/.netlify/functions/login"
  status = 200

[[redirects]]
  from = "/api/logout"
  to = "/.netlify/functions/logout"
  status = 200

[[redirects]]
  from = "/api/session"
  to = "/.netlify/functions/session"
  status = 200

[[redirects]]
  from = "/api/upload"
  to = "/.netlify/functions/upload"
  status = 200

[[redirects]]
  from = "/api/media/*"
  to = "/.netlify/functions/media/:splat"
  status = 200
